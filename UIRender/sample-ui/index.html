<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample UI</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1e1b4b,#7c3aed);color:#fff;padding:5vw;
  }
  .panel{
    background:rgba(255,255,255,.08);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.18);border-radius:20px;
    padding:2.5rem;max-width:440px;width:100%;text-align:center;
  }
  h1{font-size:1.7rem;margin-bottom:.4rem;}
  p{color:#ddd6fe;margin-bottom:1.6rem;line-height:1.5;}
  .count{font-size:3.5rem;font-weight:700;margin:.4rem 0 1.4rem;font-variant-numeric:tabular-nums;}
  .row{display:flex;gap:.6rem;justify-content:center;}
  button{
    border:none;border-radius:10px;padding:.7rem 1.3rem;font-size:1rem;font-weight:600;
    cursor:pointer;background:#fff;color:#5b21b6;transition:transform .1s;
  }
  button:hover{transform:translateY(-2px);}
  button.ghost{background:rgba(255,255,255,.14);color:#fff;}
  .hint{margin-top:1.8rem;font-size:.82rem;color:#c4b5fd;}
  code{background:rgba(0,0,0,.25);padding:.1em .4em;border-radius:5px;}
  a{color:#fff;}
</style>
</head>
<body>
  <div class="panel">
    <h1>Sample UI</h1>
    <p>This is a starter template. Everything lives inside this folder, so it's self-contained.</p>
    <div class="count" id="count">0</div>
    <div class="row">
      <button onclick="c(-1)" class="ghost">&minus;</button>
      <button onclick="c(1)">Add +1</button>
      <button onclick="reset()" class="ghost">Reset</button>
    </div>
    <div class="hint">
      To make your own UI: duplicate this <code>sample-ui/</code> folder, rename it,
      and replace this <code>index.html</code>. Add any JS/CSS/assets inside the same folder.
      <br><br><a href="../">&larr; Back to all UIs</a>
    </div>
  </div>
<script>
  let n=0;
  const el=document.getElementById('count');
  function c(d){ n+=d; el.textContent=n; }
  function reset(){ n=0; el.textContent=n; }
</script>
</body>
</html>
